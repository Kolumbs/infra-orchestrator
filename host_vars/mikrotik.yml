---
# Host-specific variables for the MikroTik router (192.168.88.1).
# These override anything set in group_vars/all.yml for this host only.

# ── Connection ────────────────────────────────────────────────────────────────
# MikroTik uses its own API rather than SSH for most tasks.
ansible_connection: network_cli
ansible_network_os: community.routeros.routeros

# ── Router identity ───────────────────────────────────────────────────────────
mikrotik_identity: home-router

# ── LAN / WAN interface names (adjust to match your RouterOS config) ──────────
lan_interface: ether2
wan_interface: ether1

# ── Firewall – ports open on the input chain ─────────────────────────────────
allowed_tcp_ports:
  - 80    # HTTP (web interface)
  - 443   # HTTPS / Let's Encrypt
  - 8291  # Winbox native port
  - 22    # SSH (management)

# ── NTP servers ───────────────────────────────────────────────────────────────
ntp_servers:
  - 0.pool.ntp.org
  - 1.pool.ntp.org
