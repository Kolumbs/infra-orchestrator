---
# Ansible Vault – encrypted secrets for a public repository.
#
# ⚠  DO NOT COMMIT THIS FILE IN PLAIN TEXT.
# Before committing, encrypt with:
#   ansible-vault encrypt group_vars/vault.yml
#
# To edit later:
#   ansible-vault edit group_vars/vault.yml
#
# Ansible will prompt for the vault password at runtime.

github_runner_token: "ghp_REPLACE_WITH_GITHUB_RUNNER_PAT"
ansible_ssh_pass: "REPLACE_WITH_YOUR_PI_PASSWORD"
ansible_user: "REPLACE_WITH_SSH_USER"
ssh_port: "REPLACE_WITH_SSH_PORT"
github_account: "REPLACE_WITH_GITHUB_ACCOUNT"
github_repo: "REPLACE_WITH_GITHUB_REPO"
pi_server_1_ip: "REPLACE_WITH_PI_SERVER_1_IP"
