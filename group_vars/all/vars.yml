---
# Silent bridge – maps vault secrets to standard Ansible/role variable names.
# This file is safe to commit: it contains no real data, only variable references.
# vault.yml holds the vault_ secrets — must stay AES-256 encrypted. See README.

ansible_user: "{{ vault_ansible_user }}"
ansible_ssh_private_key_file: "{{ vault_ansible_ssh_private_key_file }}"
ansible_port: "{{ vault_ssh_port }}"
ansible_python_interpreter: /usr/bin/python3

github_runner_registration_token: "{{ vault_github_runner_registration_token }}"
github_account: "Kolumbs"
github_repo: "family-bot"

system_timezone: "Europe/Riga"

system_upgrade_policy: "none" # one of: none, safe, full, dist, yes

apache_package_name: "apache2"
apache_package_version: null # set e.g. "2.4.62-1~deb12u2" to pin exact version
apache_service_name: "apache2"
