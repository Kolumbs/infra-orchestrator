---
# Master playbook – provisions all managed devices.
# Run: ansible-playbook main.yml --ask-vault-pass

- name: Common Setup for all Pi servers
  hosts: servers
  become: true
  tasks:
    - name: Ensure common packages are installed
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        name:
          - vim
          - curl
          - git
          - htop
        state: present

- name: Explicit system upgrade handling
  hosts: servers
  become: true
  tasks:
    - name: Validate configured system upgrade policy
      ansible.builtin.assert:
        that:
          - system_upgrade_policy in ["none", "safe", "full", "dist", "yes"]
        fail_msg: "Invalid system_upgrade_policy. Allowed values: none, safe, full, dist, yes."

    - name: Run explicit system upgrade policy
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        upgrade: "{{ system_upgrade_policy }}"
      when: system_upgrade_policy != "none"

- name: Provision web servers
  hosts: web_server
  become: true
  tasks:
    - name: Install latest configured Apache package
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        name: "{{ apache_package_name }}"
        state: present
      when: apache_package_version is not defined or apache_package_version is none

    - name: Install pinned Apache package version
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
        name: "{{ apache_package_name }}={{ apache_package_version }}"
        state: present
      when: apache_package_version is defined and apache_package_version is not none

    - name: Ensure Apache service is enabled and running
      ansible.builtin.service:
        name: "{{ apache_service_name }}"
        enabled: true
        state: started

- name: Provision GitHub Actions Runner (Pi)
  hosts: pi-server-1
  become: true
  roles:
    - role: monolithprojects.github_actions_runner
      vars:
        access_token: "{{ github_runner_registration_token }}"
        runner_user: "{{ ansible_user }}"
        runner_name: "pi-server-1"
        runner_labels:
          - self-hosted
          - Linux
          - ARM64
